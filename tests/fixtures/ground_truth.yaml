    expected_value_raw: 7082804283      # SEC <value> 原始求和（已是美元）
    expected_implied_price: 422.02      # = expected_value_raw / shares → 单位=USD
    unit: "USD"
    n_sub_rows: 6
    tolerance_pct: 0.01                 # 精确求和，1% 已足够容忍四舍五入
    source_accession: "0000102909-26-000031"
