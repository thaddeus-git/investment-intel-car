# ============================================================================
# Sanity bounds — fixture 之外的保底护栏，adapter 出口 / DB 写入前都应满足
# ============================================================================

sanity_bounds:
  max_single_holding_usd: 20000000000      # $20B / 单机构单股（Vanguard CVNA $7.08B 远低于）
  min_holding_usd: 1                       # $1 下限
  max_qoq_change_pct: 0.50                 # 50% QoQ 单股最大变动（Vanguard CVNA Q3→Q4 +39.4% 在内）
  min_institutions_per_competitor: 5       # 每只竞品至少 5 家持有
  max_implied_share_price: 1000            # 隐含股价上限（adapter 阈值上界）
  min_implied_share_price_per_unit: 0.01   # 隐含股价下限（避免除零）

