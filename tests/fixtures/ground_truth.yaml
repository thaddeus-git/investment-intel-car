# ============================================================================
# 金标准 Fixture — 13F 持仓归一化基准
# ============================================================================
# 每条 fixture 的 expected_value_usd / expected_shares 都由 agent 直接从 SEC
# EDGAR 原始 infotable.xml 读出（绝不由本项目 DB 拷贝——DB 本身是要验证的对象）。
#
# 单位判断规则（与 src/sec_adapter.py 的 _normalize_value 对齐）：
#   implied_price = value / shares
#   - implied < $1.0   → <value> 单位是 $1000s，归一化美元 = value × 1000
#   - implied $1–$1000 → <value> 已是美元，不变
#   - implied > $1000  → 异常
#
# 同一机构同一标的常被拆成多个 <infoTable> 子行（sub-advisor 分仓）。
# expected_value_usd / expected_shares 是「所有 SH 子行求和后再归一化」的结果。
# （这正是 [[fmr-cik-change]] 记录的「13F 多行去重丢值 bug」要防的坑——不能只取一行。）
#
# verified_at: 2026-06-19   verified_by: agent + SEC raw XML (cross-validated)
# 详见 README.md 的来源 URL 与验证方法。
# ============================================================================

golden_holdings:

